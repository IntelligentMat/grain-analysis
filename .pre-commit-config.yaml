default_install_hook_types:
  - pre-commit
  - pre-push
  - commit-msg

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint
        entry: ruff check --fix
        language: system
        types_or: [python]
        files: ^(main\.py|src/|tests/|scripts/)

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types_or: [python]
        files: ^(main\.py|src/|tests/|scripts/)

      - id: unit-tests
        name: unit tests
        entry: python -m unittest discover -s tests -v
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: commit-message
        name: conventional commit message
        entry: python scripts/check_commit_message.py
        language: system
        stages: [commit-msg]
